name: Weekly Data Release

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Download pricing data
        run: uv run python download.py --regions-all

      - name: Prepare data
        run: uv run python prepare.py

      - name: Export CSV files
        run: uv run python export.py

      - name: Collect and rename CSV files
        run: |
          mkdir -p dist
          for region_dir in data/pricing/*/; do
            region=$(basename "$region_dir")
            if [ -f "$region_dir/data.csv" ]; then
              cp "$region_dir/data.csv" "dist/${region}.csv"
            fi
          done

      - name: Generate release tag and metadata
        id: tag
        run: |
          echo "tag=v$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Weekly Data Release ${{ steps.tag.outputs.tag }}
          body: |
            Weekly EC2 network performance and pricing data release.

            This release contains CSV files for all AWS regions with:
            - Instance type pricing (On-Demand, Savings Plans, Reserved Instances)
            - Network performance specifications

            Generated on: ${{ steps.tag.outputs.timestamp }}
            Commit: ${{ steps.tag.outputs.commit_hash }}
          files: dist/*.csv
          fail_on_unmatched_files: true
